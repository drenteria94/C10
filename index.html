<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Página del Carro</title>
<style>
/* Estilo del cuerpo */
body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial, sans-serif;
    background-color: black;
    color: white;
}

/* Imagen de fondo */
.fondo {
    position: absolute;
    width: 400px;
    height: 300px;
    background-image: url("capture2.PNG"); /* ahora está en la raíz */
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.5;
    top: 50px;
    z-index: 0;
}

/* Contenedor principal */
.contenido {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    text-align: center;
    margin-top: 400px; /* para no tapar el fondo */
}

/* Botones */
.boton {
    padding: 15px 40px;
    font-size: 20px;
    background: black;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    transition: 0.3s;
}

.boton:hover {
    background: red;
}

/* Álbum de imágenes */
.album {
    position: relative;
    width: 80%;
    max-width: 600px;
    margin: 40px auto;
    text-align: center;
}

/* Todas las imágenes ocultas por defecto */
.album img {
    width: 100%;
    display: none;
    border-radius: 10px;
}

/* Imagen visible */
.album img.active {
    display: block;
}

/* Botones del álbum */
.album .prev,
.album .next {
    cursor: pointer;
    position: absolute;
    top: 50%;
    padding: 10px;
    margin-top: -22px;
    color: white;
    font-weight: bold;
    font-size: 24px;
    border-radius: 50%;
    background-color: rgba(0,0,0,0.5);
    user-select: none;
    transition: 0.3s;
}

.album .prev:hover,
.album .next:hover {
    background-color: rgba(255,0,0,0.8);
}

.album .prev {
    left: 0;
}

.album .next {
    right: 0;
}
</style>
</head>
<body>

<!-- Imagen de fondo -->
<div class="fondo"></div>

<!-- Contenido principal -->
<div class="contenido">
    <p>Teléfono: +34 123 456 789</p>
    <p>Correo: ejemplo@mail.com</p>

    <a class="boton" href="nido.pdf" download>Descargar PDF</a>
    <a class="boton" href="tel:+34123456789">Llamar</a>
    <a class="boton" href="mailto:ejemplo@mail.com">Enviar Correo</a>

    <!-- Álbum de imágenes -->
    <div class="album">
        <img src="proceso1.png" class="active" alt="Proceso 1">
        <img src="proceso2.png" alt="Proceso 2">
        <img src="proceso3.png" alt="Proceso 3">
        <img src="proceso4.png" alt="Proceso 4">

        <button class="prev">&#10094;</button>
        <button class="next">&#10095;</button>
    </div>
</div>

<script>
// Carrusel del álbum
let slideIndex = 0;
const slides = document.querySelectorAll('.album img');

function showSlide(n) {
    slides.forEach(img => img.classList.remove('active'));
    slides[n].classList.add('active');
}

document.querySelector('.next').addEventListener('click', () => {
    slideIndex = (slideIndex + 1) % slides.length;
    showSlide(slideIndex);
});

document.querySelector('.prev').addEventListener('click', () => {
    slideIndex = (slideIndex - 1 + slides.length) % slides.length;
    showSlide(slideIndex);
});

// Muestra la primera imagen al cargar
showSlide(slideIndex);
</script>

</body>
</html>
