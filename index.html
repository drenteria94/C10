<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Página</title>
<style>
/* Estilo del cuerpo */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: black;
    font-family: Arial, sans-serif;
    position: relative;
}

/* Imagen de fondo reducida */
.fondo {
    position: absolute;
    width: 400px;          /* ancho de la imagen */
    height: 300px;         /* alto de la imagen */
    background-image: url("capture2.PNG");



    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.5;          /* transparencia opcional */
    top: 50px;
    z-index: 0;
}

/* Contenedor de todo el contenido */
.contenido {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;             /* espacio entre elementos */
    position: relative;
    z-index: 1;
    color: white;
    text-align: center;
}

/* Estilo de la info (teléfono, correo) */
.info {
    font-size: 20px;
}

/* Botones */
.boton {
    padding: 15px 40px;
    font-size: 22px;
    background: black;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    transition: 0.3s;
}

.boton:hover {
    background: red;
}
</style>
</head>
<body>

<!-- Imagen de fondo -->
<div class="fondo"></div>

<!-- Contenido principal -->
<div class="contenido">
    <p class="info">Teléfono: +34 123 456 789</p>
    <p class="info">Correo: ejemplo@mail.com</p>

    <!-- Botón de descargar -->
    <a class="boton" href="nido.pdf" download>Descargar PDF</a>

    <!-- Botón de llamar (móvil) -->
    <a class="boton" href="tel:+34123456789">Llamar</a>

    <!-- Botón de correo (móvil o web) -->
    <a class="boton" href="mailto:ejemplo@mail.com">Enviar Correo</a>
</div>

</body>
</html>
