<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Proceso de Pintura</title>
<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }
  .fondo {
    position: absolute;
    width: 400px;          /* ancho de la imagen */
    height: 300px;         /* alto de la imagen */
    background-image: url("capture2.PNG");



    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.5;          /* transparencia opcional */
    top: 50px;
    z-index: 0;
  .album {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    overflow: hidden;
    border-radius: 12px;
  }
  .album img {
    width: 100%;
    height: auto;
    display: none;
    border-radius: 12px;
  }
  .album img.active {
    display: block;
  }
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.3);
    border: none;
    color: black;
    font-size: 2rem;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 50%;
    user-select: none;
  }
  .nav-btn:hover {
    background: rgba(255,255,255,0.7);
  }
  .prev {
    left: 8px;
  }
  .next {
    right: 8px;
  }
</style>
</head>
<body>

<div class="album">
  <img src="antes1.jpg" alt="Antes 1" class="active" />
  <img src="antes2.jpg" alt="Antes 2" />
  <img src="despues1.jpg" alt="Después 1" />
  <img src="despues2.jpg" alt="Después 2" />
  
  <button class="nav-btn prev">&#10094;</button>
  <button class="nav-btn next">&#10095;</button>
</div>

<script>
  const slides = document.querySelectorAll('.album img');
  const prevBtn = document.querySelector('.prev');
  const nextBtn = document.querySelector('.next');
  let current = 0;

  function showSlide(index) {
    slides.forEach(img => img.classList.remove('active'));
    slides[index].classList.add('active');
  }

  prevBtn.addEventListener('click', () => {
    current = (current - 1 + slides.length) % slides.length;
    showSlide(current);
  });

  nextBtn.addEventListener('click', () => {
    current = (current + 1) % slides.length;
    showSlide(current);
  });
</script>

</body>
</html>
